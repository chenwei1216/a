<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中物理·单摆实验平台 (全屏交互)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #2d3e4f;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-panel {
            display: flex;
            width: 1400px;
            max-width: 98vw;
            height: 95vh;
            background: #ecf0f3;
            border-radius: 36px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.4);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .control-panel {
            width: 320px;
            background: linear-gradient(145deg, #f0f5fa 0%, #e6edf4 100%);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.03), 4px 0 12px rgba(0,20,30,0.1);
            border-right: 1px solid #b0c4d9;
            overflow-y: auto;
        }

        .control-header {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e3b5c;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 3px solid #3a6d8c;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-header span {
            font-size: 2rem;
        }

        .exp-intro {
            background: #d4e3f0;
            padding: 18px 15px;
            border-radius: 26px;
            margin: 20px 0 25px 0;
            color: #0a2f44;
            box-shadow: inset 0 1px 4px #b6c9db, 0 6px 10px rgba(0,20,30,0.1);
            text-align: center;
        }
        .exp-intro h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #004466;
            text-align: left;
        }
        .exp-intro p {
            font-size: 1.0rem;
            line-height: 1.5;
            margin-bottom: 10px;
            text-align: left;
        }
        .formula-img {
            height: 48px;
            margin: 8px 0;
        }

        .param-group {
            background: rgba(255,255,255,0.5);
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 25px;
            backdrop-filter: blur(2px);
            box-shadow: 0 4px 8px rgba(0, 20, 30, 0.1);
        }
        .slider-item {
            margin-bottom: 26px;
        }
        .slider-item label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #1a4b6d;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        .slider-item input[type=range] {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #4682b4 0%, #87cefa 100%);
            border-radius: 20px;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        .slider-item input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #f5faff;
            border: 2px solid #1e6f9f;
            border-radius: 50%;
            box-shadow: 0 2px 8px #0e3b55;
            cursor: pointer;
            transition: 0.1s;
        }
        .value-badge {
            background: #1e5375;
            color: white;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 1.0rem;
        }

        .button-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 10px 0 15px;
            justify-content: center;
        }
        .ctrl-btn {
            background: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #024d72;
            box-shadow: 0 5px 0 #b3c7db, 0 8px 14px rgba(0,30,40,0.2);
            cursor: pointer;
            transition: 0.1s linear;
            flex: 1 1 auto;
            min-width: 110px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid #cbdae9;
        }
        .ctrl-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #9fb1c7, 0 5px 10px rgba(0,30,40,0.2);
        }
        .ctrl-btn.reset-btn {
            background: #ffe2c1;
            color: #9b4a0e;
        }

        .state-indicator {
            background: #cbdbe9;
            border-radius: 30px;
            padding: 15px;
            margin-top: 10px;
            color: #003153;
            font-weight: 500;
            font-size: 1.0rem;
            border: 1px solid #a0bbd0;
        }
        .state-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
        }
        .footer-note {
            margin-top: auto;
            font-size: 0.9rem;
            color: #4a6279;
            text-align: center;
            padding-top: 20px;
            border-top: 1px dashed #9db4cc;
        }

        .experiment-panel {
            flex: 1;
            background: #dde7f0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(#c0d0e0 1px, transparent 1px),
                linear-gradient(90deg, #c0d0e0 1px, transparent 1px);
            background-size: 30px 30px;
            box-shadow: inset 0 0 0 2px #a5b9cc;
        }

        .canvas-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pendulumCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .coord-label {
            position: absolute;
            bottom: 20px;
            right: 30px;
            background: rgba(20,40,60,0.7);
            color: white;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 1.0rem;
            letter-spacing: 0.5px;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .main-panel { flex-direction: column; }
            .control-panel { width: 100%; height: 40vh; }
        }
    </style>
</head>
<body>
<div class="main-panel">
    <div class="control-panel">
        <div class="control-header">
            <span>⚡</span> 单摆实验室
        </div>
        <div class="exp-intro">
            <h3>📘 实验讲解</h3>
            <p>单摆周期公式：</p>
            <!-- 公式图片：根号完整包住 L/g -->
            <img class="formula-img" src="https://latex.codecogs.com/svg.image?T=2\pi\sqrt{\dfrac{L}{g}}" alt="T=2π√(L/g)">
            <p>🔍 摆长越长，周期越大；<br>🔍 重力加速度g变大，摆动越快。<br>释放角度小（&lt;15°）时周期与质量、角度无关。</p>
            <p>👆 拖动下方滑块，立即观察摆的运动变化。</p>
        </div>

        <div class="param-group">
            <div class="slider-item">
                <label>📏 摆长 L <span class="value-badge" id="lengthValue">1.20 m</span></label>
                <input type="range" id="lengthSlider" min="0.6" max="2.5" value="1.2" step="0.01">
            </div>
            <div class="slider-item">
                <label>🌍 重力 g <span class="value-badge" id="gravityValue">9.80 m/s²</span></label>
                <input type="range" id="gravitySlider" min="1.0" max="20.0" value="9.8" step="0.1">
            </div>
            <div class="slider-item">
                <label>🎯 角度 θ <span class="value-badge" id="angleValue">8.0 °</span></label>
                <input type="range" id="angleSlider" min="2.0" max="25.0" value="8.0" step="0.5">
            </div>
        </div>

        <div class="button-row">
            <button class="ctrl-btn" id="startPauseBtn">▶ 开始</button>
            <button class="ctrl-btn reset-btn" id="resetBtn">↺ 复位</button>
        </div>

        <div class="state-indicator">
            <div class="state-row"><span>⚡ 当前周期 T :</span> <span id="periodDisplay">2.20 s</span></div>
            <div class="state-row"><span>📊 摆角 :</span> <span id="angleDisplay">8.0°</span></div>
            <div class="state-row"><span>⏱️ 运动状态 :</span> <span id="motionState">暂停</span></div>
        </div>
        <div class="footer-note">
            ⚛️ 初中物理经典单摆 · 空气阻力忽略
        </div>
    </div>

    <div class="experiment-panel">
        <div class="canvas-wrapper">
            <canvas id="pendulumCanvas" width="1000" height="700"></canvas>
        </div>
        <div class="coord-label">🕒 实时模拟 | 参考线: 5° 摆角</div>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('pendulumCanvas');
    const ctx = canvas.getContext('2d');

    const lengthSlider = document.getElementById('lengthSlider');
    const gravitySlider = document.getElementById('gravitySlider');
    const angleSlider = document.getElementById('angleSlider');
    const lengthValue = document.getElementById('lengthValue');
    const gravityValue = document.getElementById('gravityValue');
    const angleValue = document.getElementById('angleValue');
    const periodDisplay = document.getElementById('periodDisplay');
    const angleDisplay = document.getElementById('angleDisplay');
    const motionState = document.getElementById('motionState');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    let L = 1.2;
    let g = 9.8;
    let initAngleDeg = 8.0;

    let isRunning = false;
    let currentAngleRad = 0;
    let angularVelocity = 0;
    let lastTimestamp = null;

    const DAMPING = 0.9995;
    let canvasWidth, canvasHeight;
    let pivotX, pivotY;
    let pixelScale = 160;

    function resetToInitAngle() {
        currentAngleRad = initAngleDeg * Math.PI / 180;
        angularVelocity = 0;
        if (!isRunning) drawPendulum();
    }

    function updateLabels() {
        lengthValue.innerText = L.toFixed(2) + ' m';
        gravityValue.innerText = g.toFixed(2) + ' m/s²';
        angleValue.innerText = initAngleDeg.toFixed(1) + ' °';

        let T = 2 * Math.PI * Math.sqrt(L / g);
        periodDisplay.innerText = T.toFixed(2) + ' s';
        angleDisplay.innerText = (currentAngleRad * 180 / Math.PI).toFixed(1) + '°';
        motionState.innerText = isRunning ? '运动中' : '暂停';
    }

    function readParamsAndResetAngle() {
        L = parseFloat(lengthSlider.value);
        g = parseFloat(gravitySlider.value);
        initAngleDeg = parseFloat(angleSlider.value);
        currentAngleRad = initAngleDeg * Math.PI / 180;
        angularVelocity = 0;
        updateLabels();
        drawPendulum();
    }

    function readParamsKeepMotion() {
        L = parseFloat(lengthSlider.value);
        g = parseFloat(gravitySlider.value);
        if (!isRunning) {
            initAngleDeg = parseFloat(angleSlider.value);
            currentAngleRad = initAngleDeg * Math.PI / 180;
            angularVelocity = 0;
        } else {
            initAngleDeg = parseFloat(angleSlider.value);
        }
        updateLabels();
        drawPendulum();
    }

    lengthSlider.addEventListener('input', () => {
        if (!isRunning) readParamsAndResetAngle();
        else { L = parseFloat(lengthSlider.value); updateLabels(); drawPendulum(); }
    });
    gravitySlider.addEventListener('input', () => {
        if (!isRunning) readParamsAndResetAngle();
        else { g = parseFloat(gravitySlider.value); updateLabels(); drawPendulum(); }
    });
    angleSlider.addEventListener('input', () => {
        if (!isRunning) {
            initAngleDeg = parseFloat(angleSlider.value);
            currentAngleRad = initAngleDeg * Math.PI / 180;
            angularVelocity = 0;
        } else {
            initAngleDeg = parseFloat(angleSlider.value);
        }
        updateLabels();
        drawPendulum();
    });

    startPauseBtn.addEventListener('click', () => {
        if (isRunning) {
            isRunning = false;
            startPauseBtn.innerHTML = '▶ 开始';
            motionState.innerText = '暂停';
            lastTimestamp = null;
            drawPendulum();
        } else {
            isRunning = true;
            startPauseBtn.innerHTML = '⏸️ 暂停';
            motionState.innerText = '运动中';
            lastTimestamp = null;
            requestAnimationFrame(animationLoop);
        }
    });

    resetBtn.addEventListener('click', () => {
        if (isRunning) {
            isRunning = false;
            startPauseBtn.innerHTML = '▶ 开始';
            lastTimestamp = null;
        }
        L = parseFloat(lengthSlider.value);
        g = parseFloat(gravitySlider.value);
        initAngleDeg = parseFloat(angleSlider.value);
        currentAngleRad = initAngleDeg * Math.PI / 180;
        angularVelocity = 0;
        updateLabels();
        drawPendulum();
    });

    function animationLoop(timestamp) {
        if (!isRunning) return;
        if (lastTimestamp) {
            const dt = Math.min(0.05, (timestamp - lastTimestamp) / 1000);
            const alpha = -(g / L) * Math.sin(currentAngleRad);
            angularVelocity += alpha * dt;
            angularVelocity *= DAMPING;
            currentAngleRad += angularVelocity * dt;
        }
        lastTimestamp = timestamp;
        updateLabels();
        drawPendulum();
        requestAnimationFrame(animationLoop);
    }

    function drawPendulum() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvasWidth = canvas.width;
        canvasHeight = canvas.height;

        pivotX = canvasWidth / 2;
        pivotY = Math.min(120, canvasHeight * 0.15);

        let pixelLength = L * pixelScale;
        const maxAllowedY = canvasHeight - 50;
        const maxLenFromPivot = maxAllowedY - pivotY;
        if (pixelLength > maxLenFromPivot) {
            pixelScale = maxLenFromPivot / L * 0.95;
            pixelLength = L * pixelScale;
        }

        const ballX = pivotX + pixelLength * Math.sin(currentAngleRad);
        const ballY = pivotY + pixelLength * Math.cos(currentAngleRad);

        ctx.save();
        ctx.beginPath();
        ctx.strokeStyle = '#7a8faa';
        ctx.lineWidth = 1.2;
        ctx.setLineDash([6, 8]);
        ctx.arc(pivotX, pivotY, pixelLength, 0, Math.PI, true);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#3a4f66';
        ctx.shadowColor = '#a0b0c0';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.rect(pivotX - 30, pivotY - 10, 60, 16);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#6b8ba0';
        ctx.beginPath();
        ctx.rect(pivotX - 8, pivotY - 20, 16, 20);
        ctx.fill();

        ctx.beginPath();
        ctx.strokeStyle = '#2c4058';
        ctx.lineWidth = 2.5;
        ctx.moveTo(pivotX, pivotY);
        ctx.lineTo(ballX, ballY);
        ctx.stroke();

        ctx.shadowBlur = 14;
        ctx.shadowColor = '#30485c';
        ctx.beginPath();
        ctx.arc(ballX, ballY, 16, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffb347';
        ctx.fill();
        ctx.strokeStyle = '#b16517';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(ballX, ballY, 3, 0, 2 * Math.PI);
        ctx.fillStyle = '#232323';
        ctx.fill();

        if (Math.abs(currentAngleRad) > 0.02) {
            ctx.beginPath();
            ctx.strokeStyle = '#1a5f7a';
            ctx.lineWidth = 1.8;
            ctx.setLineDash([3, 3]);
            let radiusArc = 70;
            ctx.arc(pivotX, pivotY, radiusArc, 0, currentAngleRad, currentAngleRad < 0);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.font = 'bold 18px "Segoe UI", "Roboto"';
        ctx.fillStyle = '#0c3348';
        ctx.fillText(`L = ${L.toFixed(2)} m`, pivotX + 40, pivotY - 30);
        ctx.restore();
    }

    function initialDraw() {
        updateLabels();
        drawPendulum();
    }

    window.addEventListener('resize', () => {
        drawPendulum();
    });

    initialDraw();
    readParamsAndResetAngle();
})();
</script>
</body>
</html>
